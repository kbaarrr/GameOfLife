<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Curio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23B96F4B'/></svg>" />
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <a class="logo" href="index.html"><span class="dot"></span>Curio</a>
    <div class="nav-cta">
      <span class="muted" style="font-size:.9rem;">New to Curio?</span>
      <a class="btn btn-accent btn-sm" href="signup.html">Start free month</a>
    </div>
  </nav>
</header>

<main class="auth-wrap">
  <div class="form-card">
    <h2 class="center">Welcome back</h2>
    <p class="muted center" style="margin-bottom: 26px;">Sign in to manage your studio, tracks and kit.</p>
    <div class="alert alert-error" id="loginAlert"></div>
    <form id="loginForm" novalidate>
      <div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="email" placeholder="you@example.com" /><div class="err-msg">Please enter your email.</div></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" autocomplete="current-password" /><div class="err-msg">Please enter your password.</div></div>
      <button class="btn btn-primary btn-block" type="submit" style="margin-top: 8px;">Sign in</button>
    </form>
    <p class="form-note">No account yet? <a href="signup.html">Start your free month</a></p>
  </div>
  <p class="form-note">Just looking around? <button class="link-btn" id="demoBtn" style="background:none;border:none;cursor:pointer;color:var(--clay-deep);font-weight:600;text-decoration:underline;text-underline-offset:3px;font-size:.92rem;font-family:inherit;padding:0;">Explore a demo family's studio →</button></p>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
(function () {
  const form = document.getElementById("loginForm");
  const alertBox = document.getElementById("loginAlert");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    alertBox.classList.remove("show");
    const email = document.getElementById("email");
    const pass = document.getElementById("password");

    let ok = true;
    [email, pass].forEach((el) => {
      const valid = el.value.trim().length > 0;
      el.closest(".field").classList.toggle("error", !valid);
      ok = ok && valid;
    });
    if (!ok) return;

    const user = CurioStore.login(email.value.trim(), pass.value);
    if (!user) {
      alertBox.textContent = "We couldn't match that email and password. Check the details, or start a free month to create an account.";
      alertBox.classList.add("show");
      return;
    }
    location.href = "dashboard.html";
  });

  document.getElementById("demoBtn").addEventListener("click", () => {
    CurioUI.demoUser();
    location.href = "dashboard.html";
  });
})();
</script>
</body>
</html>
